server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"

spring:
  application:
    name: api-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: group-service
          uri: http://group-service:8082
          predicates:
            - Path=/api/groups/**
          filters:
            - Authentication

        - id: personal-service
          uri: http://personal-finance-service:8084
          predicates:
            - Path=/api/personal/**
          filters:
            - Authentication

        - id: settlement-service
          uri: http://settlement-service:8083
          predicates:
            - Path=/api/settlements/**
          filters:
            - Authentication
